apiVersion: apps/v1
kind: Deployment
metadata:
  name: tokenki-api-master
  namespace: tokenki
spec:
  replicas: 1
  selector:
    matchLabels:
      app: tokenki-api
      role: master
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  template:
    metadata:
      labels:
        app: tokenki-api
        role: master
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "3000"
        prometheus.io/path: "/metrics"
    spec:
      imagePullSecrets:
      - name: ghcr-secret
      # 等待 LLM 长任务结束（与 GRACEFUL_SHUTDOWN_TIMEOUT 配对）
      terminationGracePeriodSeconds: 3660
      containers:
      - name: tokenki-api
        image: ghcr.io/heiying0917/tokenki:placeholder
        ports:
        - containerPort: 3000
        envFrom:
        - configMapRef:
            name: tokenki-api-config
        env:
        - name: NODE_TYPE
          value: "master"
        - name: SESSION_SECRET
          valueFrom:
            secretKeyRef:
              name: tokenki-api
              key: SESSION_SECRET
        - name: CRYPTO_SECRET
          valueFrom:
            secretKeyRef:
              name: tokenki-api
              key: CRYPTO_SECRET
        - name: SQL_DSN
          valueFrom:
            secretKeyRef:
              name: tokenki-api
              key: SQL_DSN
        - name: REDIS_CONN_STRING
          valueFrom:
            secretKeyRef:
              name: tokenki-api
              key: REDIS_CONN_STRING
        # readiness：用 new-api 自带的 /api/status，返回 200 即视为就绪
        # 不引入 /api/health/ready 自定义端点，减少与上游 merge 冲突面
        readinessProbe:
          httpGet:
            path: /api/status
            port: 3000
          initialDelaySeconds: 15
          periodSeconds: 5
          failureThreshold: 3
        livenessProbe:
          httpGet:
            path: /api/status
            port: 3000
          initialDelaySeconds: 60
          periodSeconds: 30
          failureThreshold: 3
        lifecycle:
          preStop:
            exec:
              # 给 nginx ingress 摘流量时间（endpoint controller 更新有延迟）
              command: ["/bin/sh", "-c", "sleep 15"]
        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "1Gi"
            cpu: "1000m"
