# tokenki.com / www.tokenki.com → tokenki-api
# 共用 tokensolo 集群的 ingress-nginx-controller + CLB（lb-5j4mtrgo）
# 共用 ClusterIssuer letsencrypt-prod（已存在于集群）
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: tokenki-api-ingress
  namespace: tokenki
  annotations:
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    # proxy-read-timeout 是两次 chunk 间的空闲超时，不是总时长
    # 1800s 覆盖 Claude/Codex extended thinking 沉默阶段（最长数分钟无输出）
    nginx.ingress.kubernetes.io/proxy-read-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "1800"
    nginx.ingress.kubernetes.io/proxy-connect-timeout: "10"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    # 关闭响应缓冲，LLM stream token 实时透传给客户端
    nginx.ingress.kubernetes.io/proxy-buffering: "off"
    # 关闭请求体缓冲，大文件/流式请求体直通后端，不在 nginx 内存中积累
    nginx.ingress.kubernetes.io/proxy-request-buffering: "off"
    # WebSocket/SSE 支持 + 安全响应头 + 隐藏服务标识
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    # 允许透传含下划线的请求头（如 session_id），默认 off 会静默丢弃
    nginx.ingress.kubernetes.io/server-snippet: |
      underscores_in_headers on;
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header Upgrade $http_upgrade;
      proxy_set_header Connection "upgrade";
      add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
      add_header X-Frame-Options "SAMEORIGIN" always;
      add_header X-Content-Type-Options "nosniff" always;
      add_header Referrer-Policy "no-referrer-when-downgrade" always;
      add_header Permissions-Policy "camera=(), microphone=(), geolocation=()" always;
      proxy_hide_header Server;
spec:
  ingressClassName: nginx
  tls:
  - hosts:
    - tokenki.com
    - www.tokenki.com
    secretName: tokenki-api-tls
  rules:
  - host: tokenki.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tokenki-api
            port:
              number: 3000
  - host: www.tokenki.com
    http:
      paths:
      - path: /
        pathType: Prefix
        backend:
          service:
            name: tokenki-api
            port:
              number: 3000
