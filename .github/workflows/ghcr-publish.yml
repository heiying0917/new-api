name: Publish Docker image (GHCR for TKE)

# 推 ghcr.io/heiying0917/tokenki:<tag>，供 TKE 集群拉取。
# 与 docker-build.yml（推 dockerhub calciumion/new-api，multi-arch）并存，互不影响。
#
# 架构：只打 linux/amd64
#   - TKE 节点全是 x86_64，不需要 arm64
#   - arm64 在 ubuntu-latest 上要 qemu 模拟，编译 Go + 前端 build 慢 3-5 倍（实测 15 分钟 vs 5 分钟）
#   - 本地 Mac arm64 开发用 docker-compose.dev.yml 本地 build，不依赖 GHCR
#
# 触发：
#   - push tag v*（vYYYY.MM.DD.N）
#   - workflow_dispatch（手动指定 tag）

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag:
        description: 'Tag name to build (e.g. v2026.06.16.1)'
        required: true
        type: string

env:
  IMAGE_NAME: ghcr.io/heiying0917/tokenki

jobs:
  build_and_push:
    name: Build & Push
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
      id-token: write
    steps:
      - name: Resolve tag
        id: tag
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            TAG="${{ github.event.inputs.tag }}"
          else
            TAG="${GITHUB_REF##refs/tags/}"
          fi
          echo "value=$TAG" >> $GITHUB_OUTPUT
          echo "Resolved tag: $TAG"

      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # 注：只打 amd64 不需要 QEMU（amd64 是 runner 原生架构）
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build & push (linux/amd64)
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}
            ${{ env.IMAGE_NAME }}:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max
          provenance: mode=max
          sbom: true

      - name: Install cosign
        uses: sigstore/cosign-installer@v3

      - name: Sign image with cosign
        run: |
          cosign sign --yes ${{ env.IMAGE_NAME }}@${{ steps.build.outputs.digest }}

      - name: Image summary
        run: |
          {
            echo "### Docker Image (GHCR)"
            echo ""
            echo '```'
            echo "${{ env.IMAGE_NAME }}:${{ steps.tag.outputs.value }}"
            echo "${{ steps.build.outputs.digest }}"
            echo '```'
          } >> $GITHUB_STEP_SUMMARY
